<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonioaey Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #DFFFF3;
            background-image: 
                linear-gradient(#A8EFDF 1px, transparent 1px),
                linear-gradient(90deg, #A8EFDF 1px, transparent 1px);
            background-size: 25px 25px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animation ลอยขึ้นลงสลับไปมา */
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .emoji-float {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: floatAnim 4s ease-in-out infinite;
        }

        /* ใส่ delay ให้แต่ละตัวลอยไม่พร้อมกัน */
        .d-1 { animation-delay: 0s; }
        .d-2 { animation-delay: 1s; animation-duration: 5s; }
        .d-3 { animation-delay: 2s; animation-duration: 3s; }
        .d-4 { animation-delay: 0.5s; animation-duration: 6s; }

        .bounce-hover:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 text-[#333333]">

    <div class="emoji-float d-1 text-3xl" style="top: 10%; left: 5%;">🍃</div>
    <div class="emoji-float d-2 text-4xl" style="top: 20%; right: 8%;">🐳</div>
    <div class="emoji-float d-3 text-2xl" style="bottom: 15%; left: 10%;">🐠</div>
    <div class="emoji-float d-4 text-3xl" style="bottom: 25%; right: 12%;">🌿</div>
    <div class="emoji-float d-1 text-2xl" style="top: 50%; left: 2%;">🌱</div>
    <div class="emoji-float d-2 text-3xl" style="top: 60%; right: 3%;">🐟</div>

    <div class="relative z-10 mb-8 flex flex-col items-center gap-4 mt-4">
        <div class="flex gap-2">
            <span class="w-3 h-3 rounded-full bg-[#8DEED8] animate-pulse"></span>
            <span class="w-3 h-3 rounded-full bg-[#F7F2D1]"></span>
            <span class="w-3 h-3 rounded-full bg-[#A8EFDF]"></span>
        </div>

        <div class="relative">
            <div class="emoji-float d-3 absolute -top-8 -left-8 text-2xl">🌱</div>
            <div class="emoji-float d-4 absolute -bottom-8 -right-8 text-2xl">🐳</div>
            <h1 class="text-2xl md:text-3xl font-bold tracking-wide drop-shadow-sm">
                Nonioaey Payment
            </h1>
        </div>
        
        <div class="bg-white/80 border border-[#8DEED8] px-4 py-1.5 rounded-full text-[12px] flex items-center gap-2">
            <span class="h-2 w-2 rounded-full bg-green-500 animate-ping"></span>
            เช็คคิวงานล่าสุด: <span class="font-bold underline">คลิกที่นี่</span>
        </div>
    </div>

    <div class="max-w-md w-full relative z-10">
        <div class="bg-white p-2 rounded-[24px] border-4 border-[#8DEED8] shadow-lg relative mb-6 overflow-hidden">
            <div class="absolute -top-3 -right-3 z-20 bg-[#F7F2D1] border-2 border-dashed border-[#8DEED8] px-3 py-1 rounded-lg text-[10px] font-bold rotate-6">
                PAYMENT QR
            </div>

            <img src="ไม่มีชื่อ 899_20260220224704.png" alt="Payment QR" class="w-full h-auto object-cover rounded-[16px]" onerror="this.src='899_20260220224704.png'">
        </div>

        <div class="bg-white/95 px-6 pb-8 pt-8 rounded-[24px] border-2 border-[#A8EFDF] shadow-sm">
            <div class="space-y-6 text-center">
                <div>
                    <p class="text-[15px] font-medium">
                        🌿 อย่าลืมโน๊ตสลิปกันนะคะ 🌿
                        <br><span class="text-[13px] text-gray-500">หากลืมโน๊ตสลิปโอนมาใหม่ 0.1 พร้อมโน๊ตสลิปนะ</span>
                    </p>
                </div>

                <div class="space-y-4 pt-4 border-t border-dashed border-[#8DEED8]">
                    <div class="bg-white rounded-[16px] p-3 flex items-center justify-between border-2 border-[#8DEED8]">
                        <div class="flex items-center gap-3 text-left">
                            <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white font-bold text-xs">K</div>
                            <div>
                                <div class="text-[10px] text-gray-400">กสิกรไทย (ศศิกานต์ น้ำเขียว)</div>
                                <div class="font-bold text-base">1311458678</div>
                            </div>
                        </div>
                        <button onclick="copyText('1311458678', this)" class="bg-[#8DEED8] text-white text-[11px] font-bold px-4 py-2 rounded-full">COPY</button>
                    </div>

                    <div class="bg-white rounded-[16px] p-3 flex items-center justify-between border-2 border-[#F7F2D1]">
                        <div class="flex items-center gap-3 text-left">
                            <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold text-xs">W</div>
                            <div>
                                <div class="text-[10px] text-gray-400">วอเลท (ศศิกานต์ น้ำเขียว)</div>
                                <div class="font-bold text-base text-orange-500">0826348896</div>
                            </div>
                        </div>
                        <button onclick="copyText('0826348896', this)" class="bg-[#F7F2D1] text-gray-700 text-[11px] font-bold px-4 py-2 rounded-full">COPY</button>
                    </div>
                </div>

                <a href="https://tmn.app.link/nEoPnxQ9R1b" class="block w-full py-2 bg-[#DFFFF3] rounded-lg text-[12px] font-bold">🔗 กดเพื่อโอนผ่านลิงก์ Wallet</a>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-6 bg-[#8DEED8] text-white px-6 py-3 rounded-full opacity-0 transition-all duration-300 z-50">คัดลอกสำเร็จ! ✨</div>

    <script>
        function copyText(text, btn) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0');
            btn.innerText = 'DONE!';
            setTimeout(() => {
                toast.classList.add('opacity-0');
                btn.innerText = 'COPY';
            }, 2000);
        }
    </script>
</body>
</html>
